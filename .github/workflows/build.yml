name: Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "✅ Built version: $VERSION_NAME (code: $VERSION_CODE)"
      
      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          ls -lh
          APK_FILE=$(ls *.apk | head -1)
          echo "Found: $APK_FILE"
          cp "$APK_FILE" Sakina-Launcher-${{ steps.version.outputs.name }}.apk
          echo "✅ Renamed to: Sakina-Launcher-${{ steps.version.outputs.name }}.apk"
          ls -lh Sakina-Launcher-*.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sakina-Launcher-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/Sakina-Launcher-*.apk
          retention-days: 90
      
      - name: Build summary
        run: |
          echo "### ✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.name }} (code: ${{ steps.version.outputs.code }})" >> $GITHUB_STEP_SUMMARY
          echo "**APK**: Sakina-Launcher-${{ steps.version.outputs.name }}.apk" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download dari Artifacts section di atas" >> $GITHUB_STEP_SUMMARY
