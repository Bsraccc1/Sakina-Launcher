name: Android CI/CD

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate debug keystore
      run: |
        mkdir -p "$HOME/.android"
        if [ ! -f "$HOME/.android/debug.keystore" ]; then
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Get version name
      id: version
      run: |
        VERSION=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"' || echo "v1.0.0")
        echo "name=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$VERSION-build.${{ github.run_number }}" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Rename APK files
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/sakinah-launcher-${{ steps.version.outputs.tag }}-debug.apk
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/sakinah-launcher-${{ steps.version.outputs.tag }}-release.apk

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sakinah-launcher-debug-${{ steps.version.outputs.date }}
        path: app/build/outputs/apk/debug/sakinah-launcher-${{ steps.version.outputs.tag }}-debug.apk
        retention-days: 30

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sakinah-launcher-release-${{ steps.version.outputs.date }}
        path: app/build/outputs/apk/release/sakinah-launcher-${{ steps.version.outputs.tag }}-release.apk
        retention-days: 90
