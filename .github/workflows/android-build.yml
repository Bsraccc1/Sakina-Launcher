name: Android CI/CD

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Build Release APK
      run: ./gradlew assembleRelease
      
    - name: Get version name
      id: version
      run: |
        VERSION=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"' || echo "1.0.0")
        echo "name=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION-build.${{ github.run_number }}" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
      
    - name: Rename APK files
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/sakinah-launcher-${{ steps.version.outputs.tag }}-debug.apk
        mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/sakinah-launcher-${{ steps.version.outputs.tag }}-release-unsigned.apk
      
    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sakinah-launcher-debug-${{ steps.version.outputs.date }}
        path: app/build/outputs/apk/debug/sakinah-launcher-${{ steps.version.outputs.tag }}-debug.apk
        retention-days: 30
        
    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sakinah-launcher-release-${{ steps.version.outputs.date }}
        path: app/build/outputs/apk/release/sakinah-launcher-${{ steps.version.outputs.tag }}-release-unsigned.apk
        retention-days: 90
    
    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Sakinah Launcher ${{ steps.version.outputs.tag }}
        body: |
          ## 🚀 Sakinah Launcher Build ${{ steps.version.outputs.tag }}
          
          **Build Date:** ${{ steps.version.outputs.date }}
          **Commit:** ${{ github.sha }}
          
          ### 📦 Downloads
          - **Debug APK**: For testing and development
          - **Release APK**: For production use (unsigned)
          
          ### ✨ Recent Changes
          ${{ github.event.head_commit.message }}
          
          ---
          Built automatically by GitHub Actions
        files: |
          app/build/outputs/apk/debug/sakinah-launcher-${{ steps.version.outputs.tag }}-debug.apk
          app/build/outputs/apk/release/sakinah-launcher-${{ steps.version.outputs.tag }}-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
