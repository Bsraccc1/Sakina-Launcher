name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME (code: $VERSION_CODE)"
      
      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          mv app-release-unsigned.apk Sakina-Launcher-${{ steps.version.outputs.name }}.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Sakina Launcher ${{ steps.version.outputs.name }}
          body: |
            ## 🕌 Sakina Launcher ${{ steps.version.outputs.name }}
            
            **Minimal Android launcher with Islamic features for mindful Muslim productivity**
            
            ### ✨ Features
            - 🕌 **Muslim Center** - Prayer times (Kemenag & Aladhan APIs)
            - 📿 **Morning & Evening Dhikr** - Daily remembrance from almanhaj.or.id
            - 📝 **Productive Note Panel** - Todos & chat-style notes
            - ⏱️ **Focus Timer** - Circular progress timer
            - 🎯 **Minimal Launcher** - Distraction-free home screen
            - 🔒 **Privacy First** - No ads, no tracking, no analytics
            
            ### 📥 Download & Install
            
            **APK**: `Sakina-Launcher-${{ steps.version.outputs.name }}.apk` (unsigned)
            
            **Installation steps:**
            1. Download APK di bawah
            2. Buka Settings → Security → Enable "Install unknown apps"
            3. Install APK
            4. Set sebagai default launcher
            
            ⚠️ **Note**: APK ini **unsigned** (untuk testing). Untuk production, gunakan signed APK.
            
            ### 📱 Requirements
            - Android 7.0+ (API 24+)
            - Permissions: Usage Stats, Display over other apps (optional)
            
            ### 🙏 Credits
            Forked from [Olauncher](https://github.com/tanujnotes/Olauncher) by @tanujnotes
            
            Islamic content from:
            - Prayer times: Kemenag API & Aladhan API
            - Dhikr: almanhaj.or.id
            
            ### 📊 Build Info
            - Version Code: ${{ steps.version.outputs.code }}
            - Built with: GitHub Actions
            - JDK: 17 (Temurin)
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/Sakina-Launcher-${{ steps.version.outputs.name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sakina-launcher-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/Sakina-Launcher-*.apk
          retention-days: 90
