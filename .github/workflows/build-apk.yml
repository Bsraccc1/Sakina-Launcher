name: Build and Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional release tag (contoh: v6.5.0). Jika kosong, otomatis dibuat.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Resolve version and tag
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')
          INPUT_TAG="${{ github.event.inputs.tag }}"

          if [ -n "$INPUT_TAG" ]; then
            RELEASE_TAG="$INPUT_TAG"
          else
            RELEASE_TAG="${VERSION_NAME}-build.${{ github.run_number }}"
          fi

          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          APK_FILE=$(ls *.apk | head -1)
          cp "$APK_FILE" "Sakina-Launcher-${{ steps.version.outputs.name }}.apk"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Sakinah Launcher ${{ steps.version.outputs.tag }}
          body: |
            Automated release for Sakinah Launcher ${{ steps.version.outputs.tag }}.
            versionName: ${{ steps.version.outputs.name }}
            versionCode: ${{ steps.version.outputs.code }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/Sakina-Launcher-${{ steps.version.outputs.name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
