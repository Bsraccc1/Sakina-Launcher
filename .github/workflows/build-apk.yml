name: Build and Release APK

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Create debug keystore
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -storetype PKCS12 \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Read version
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Prepare APK
        id: apk
        run: |
          mkdir -p release
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          TARGET="release/Sakina-Launcher-${{ steps.version.outputs.name }}.apk"
          cp "$APK_FILE" "$TARGET"
          echo "path=$TARGET" >> "$GITHUB_OUTPUT"
          ls -lh release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakina-Launcher-${{ steps.version.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Sakina Launcher ${{ steps.version.outputs.name }}
          body: |
            ## Sakina Launcher ${{ steps.version.outputs.name }}

            Minimal Android launcher with Muslim Center, chat-style notes, todos, and focus timer.

            ### Install

            1. Download `Sakina-Launcher-${{ steps.version.outputs.name }}.apk` from the assets below.
            2. Enable "Install unknown apps" on Android if prompted.
            3. Install the APK.
            4. Set Sakina Launcher as your default Home app.

            ### Build

            - Version: ${{ steps.version.outputs.name }}
            - Version code: ${{ steps.version.outputs.code }}
            - Commit: ${{ github.sha }}

            ### Credits

            Forked from [Olauncher](https://github.com/tanujnotes/Olauncher) by [@tanujnotes](https://github.com/tanujnotes).
          draft: false
          prerelease: false
          files: ${{ steps.apk.outputs.path }}
