name: Build and Release APK

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create or update a GitHub Release with the APK'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Read version
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="${VERSION_NAME}"
          fi
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare APK
        id: apk
        run: |
          mkdir -p release
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          TARGET="release/Sakina-Launcher-${{ steps.version.outputs.name }}.apk"
          cp "$APK_FILE" "$TARGET"
          echo "path=$TARGET" >> "$GITHUB_OUTPUT"
          ls -lh release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakina-Launcher-${{ steps.version.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Sakina Launcher ${{ steps.version.outputs.name }}
          body: |
            ## Sakina Launcher ${{ steps.version.outputs.name }}

            Minimal Android launcher with Muslim Center, chat-style notes, todos, and focus timer.

            ### Install

            1. Download `Sakina-Launcher-${{ steps.version.outputs.name }}.apk` from the assets below.
            2. Enable "Install unknown apps" on Android if prompted.
            3. Install the APK.
            4. Set Sakina Launcher as your default Home app.

            ### Build

            - Version: ${{ steps.version.outputs.name }}
            - Version code: ${{ steps.version.outputs.code }}
            - Commit: ${{ github.sha }}

            ### Credits

            Forked from [Olauncher](https://github.com/tanujnotes/Olauncher) by [@tanujnotes](https://github.com/tanujnotes).
          draft: false
          prerelease: false
          files: ${{ steps.apk.outputs.path }}

      - name: Release summary
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        run: |
          echo "### APK release ready" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release tag: ${{ steps.version.outputs.release_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- APK: Sakina-Launcher-${{ steps.version.outputs.name }}.apk" >> "$GITHUB_STEP_SUMMARY"
          echo "- Install from the GitHub Release assets." >> "$GITHUB_STEP_SUMMARY"
